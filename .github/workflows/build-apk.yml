name: Build APK from PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # اجازه اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap Project
        run: |
          bubblewrap init --manifest="https://example.com/manifest.json" --directory="./bubblewrap" || true
          # ما از حالت interactive رد می‌شویم و تنظیمات را دستی می‌سازیم
          mkdir -p bubblewrap
          cat > bubblewrap/twa-manifest.json <<EOF
          {
            "packageId": "com.yourname.water",
            "host": "localhost",
            "name": "دفتر حساب آب",
            "launcherName": "دفتر آب",
            "display": "standalone",
            "themeColor": "#1a5276",
            "backgroundColor": "#ffffff",
            "startUrl": "index.html",
            "iconUrl": "icon-512.png",
            "maskableIconUrl": "icon-192.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "alias": "upload",
              "password": "android"
            }
          }
          EOF

      - name: Generate signing key
        run: |
          keytool -genkey -v -keystore ./bubblewrap/android.keystore -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=WaterApp, OU=Dev, O=Personal, L=City, S=State, C=IR"

      - name: Build APK with Bubblewrap
        run: |
          cd bubblewrap
          bubblewrap build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: water-app-apk
          path: bubblewrap/app-release-signed.apk
