name: Build APK (Non‑Interactive)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create TWA Manifest
        run: |
          mkdir -p bubblewrap
          cat > bubblewrap/twa-manifest.json <<'EOF'
          {
            "packageId": "com.water.manager",
            "host": "localhost",
            "name": "دفتر حساب آب",
            "launcherName": "دفتر آب",
            "display": "standalone",
            "themeColor": "#1a5276",
            "backgroundColor": "#ffffff",
            "startUrl": "index.html",
            "iconUrl": "icon-512.png",
            "maskableIconUrl": "icon-192.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "alias": "upload",
              "password": "android"
            }
          }
          EOF

      - name: Generate signing key
        run: |
          keytool -genkey -v -keystore ./bubblewrap/android.keystore \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=WaterApp, OU=Dev, O=Personal, L=City, S=State, C=IR" \
            -noprompt

      - name: Build APK (non‑interactive)
        run: |
          cd bubblewrap
          export CI=true
          bubblewrap build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: water-app-apk
          path: bubblewrap/app-release-signed.apk
